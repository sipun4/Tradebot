services:
  - type: web
    name: nexus-trader
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: COINSWITCH_API_KEY
        sync: false
      - key: COINSWITCH_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: COINSWITCH_EXCHANGE
        value: c2c2
      - key: MAX_TRADE_USDT
        value: "50"
      - key: SCAN_INTERVAL
        value: "10"
      - key: LIVE_TRADING
        value: "false"
